<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Grid Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <header class="navbar">
            <h2>Deep°style</h2>

            <nav>
                <a href="#">New Arrivals</a>
                <a href="#">Shop</a>
                <a href="#">Beauty</a>
                <a href="#">Sale</a>
                <a href="#">Journal</a>
            </nav>

            <div class="icons">
                <span>🔍</span>
                <span>⚙️</span>
                <span>🛒</span>
            </div>
        </header>

        <section class="hero">

            <h1>Make Your Fashion Look <br> More Charming</h1>

            <div class="left-text">
                <p>Summer Collection</p>
                <h3>TRANDY AND <br> CLUSSI FOR <br> NEW SEASSON</h3>
            </div>

            <div class="gallery">

                <div class="card card1">
                    <img src="image1.png" alt="">
                </div>

                <div class="card card2">
                    <img src="image2.png" alt="">
                </div>

                <div class="card card3 big">
                    <img src="bigimage.png" alt="">
                </div>

                <div class="card card4">
                    <img src="image4.png" alt="">
                </div>

                <div class="card card5">
                    <img src="image3.png" alt="">
                </div>

                <div class="card card6">
                    <img src="image5.png" alt="">
                </div>

                <div class="card card7">
                    <img src="image6.png" alt="">
                    <span>2022</span>
                </div>
               

            </div>

            <div class="explore">
                <div class="circle">
                    EXPLORE MORE
                </div>
            </div>

            <button class="scroll-btn">
                SCROLL DOWN
            </button>

        </section>

    </div>

</body>
</html>
